<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACRO Pipeline Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS reset and base styles */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* Ambient Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(40px) scale(1.1); }
        }

        /* Typography */
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 32px; line-height: 1.5; }

        /* Drag and Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(148, 163, 184, 0.4);
            border-radius: 16px;
            padding: 64px 32px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            fill: none;
            stroke: #a78bfa;
            stroke-width: 1.5;
            transition: transform 0.3s ease;
        }
        .drop-zone:hover .upload-icon { transform: translateY(-8px); }

        .drop-text { font-size: 1.2rem; font-weight: 600; color: #f1f5f9; margin-bottom: 8px; }
        .sub-text { font-size: 0.9rem; color: #64748b; }
        
        input[type="file"] { display: none; }

        /* Terminal Window */
        .terminal {
            display: none;
            margin-top: 24px;
            background: #020617;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 16px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #10b981;
            line-height: 1.5;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.5);
            text-align: left;
        }
        .terminal-line {
            margin-bottom: 4px;
            animation: fadeIn 0.3s ease-in;
        }
        .terminal-line.error { color: #ef4444; }
        .terminal-line.info { color: #60a5fa; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress State */
        .progress-container { display: none; margin-top: 32px; }
        .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; width: 100%; overflow: hidden; margin-bottom: 12px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.4s ease; }
        .status-text { display: flex; justify-content: space-between; font-size: 0.9rem; color: #cbd5e1; }
        
        /* Button */
        button {
            margin-top: 24px;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5); }
        button:active { transform: translateY(1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* Custom scrollbar */
        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="glass-panel">
        <h1>ACRO Pipeline</h1>
        <p>Securely orchestrate massive FHIR JSON extraction and ingestion securely into your Medplum database.</p>
        
        <div class="drop-zone" id="drop-zone">
            <svg class="upload-icon" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
            </svg>
            <div class="drop-text" id="drop-text">Drag & Drop Batch File</div>
            <div class="sub-text">Supports .json or .zip collections</div>
            <input type="file" id="file-input" accept=".json,.zip">
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="status-text">
                <span id="status-label">Establishing API handshake...</span>
                <span id="percentage">0%</span>
            </div>
        </div>
        
        <div class="terminal" id="terminal"></div>

        <button id="upload-btn" disabled>Start Ingestion Engine</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const dropText = document.getElementById('drop-text');
        const uploadBtn = document.getElementById('upload-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const percentage = document.getElementById('percentage');
        const terminal = document.getElementById('terminal');
        let selectedFile = null;

        // WebSocket Setup for Real-time Architecture
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            if(terminal.style.display !== 'block') terminal.style.display = 'block';
            const dataStr = event.data;
            const line = document.createElement('div');
            line.className = 'terminal-line';
            if (dataStr.includes('❌')) line.classList.add('error');
            if (dataStr.includes('⚙️') || dataStr.includes('🔍')) line.classList.add('info');
            
            const timestamp = new Date().toLocaleTimeString('en-US', {hour12: false});
            line.textContent = `[${timestamp}] > ${dataStr}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            // Auto update progress bar based on logs
            if (dataStr.includes('Extracting')) setProgress(15);
            if (dataStr.includes('Authenticated')) setProgress(30);
            if (dataStr.includes('Upserting')) {
                const match = dataStr.match(/\[Transaction (\d+)\/(\d+)\]/);
                if (match) {
                    const current = parseInt(match[1]);
                    const total = parseInt(match[2]);
                    setProgress(30 + Math.floor((current / total) * 65));
                }
            }
            if (dataStr.includes('Successfully ingested')) {
                setProgress(100);
                uploadBtn.textContent = 'Upload Completed Gracefully!';
                uploadBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            }
        };

        function setProgress(val) {
            progressBar.style.width = val + '%';
            percentage.textContent = val + '%';
        }

        dropZone.addEventListener('click', () => fileInput.click());
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => { dropZone.addEventListener(eventName, e => {e.preventDefault(); e.stopPropagation();}, false); });
        ['dragenter', 'dragover'].forEach(eventName => dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false));
        ['dragleave', 'drop'].forEach(eventName => dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false));

        dropZone.addEventListener('drop', (e) => {
            selectedFile = e.dataTransfer.files[0];
            updateFileDisplay();
        }, false);

        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            updateFileDisplay();
        });

        function updateFileDisplay() {
            if (selectedFile) {
                dropText.textContent = selectedFile.name;
                uploadBtn.disabled = false;
            }
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Orchestrating Background Worker...';
            dropZone.style.display = 'none';
            progressContainer.style.display = 'block';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/api/ingest', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Upload failed');
            } catch (err) {
                uploadBtn.textContent = 'Connection Error';
                uploadBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            }
        });
    </script>
</body>
</html>
